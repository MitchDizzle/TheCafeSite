<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse photos of The Café's catering events and meal prep — food, setups, and finished spreads.">
    <title>Gallery | The Café</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Masonry-style photo grid */
        .gallery-grid {
            columns: 3 280px;
            column-gap: 1rem;
            margin-top: 2rem;
        }

        .gallery-grid__item {
            break-inside: avoid;
            margin-bottom: 1rem;
            border-radius: 3px;
            overflow: hidden;
            background: #E8E2D9;
        }

        .gallery-grid__item img {
            width: 100%;
            display: block;
            /* All gallery images lazy loaded */
        }

        /* Placeholder block shown until real images are added */
        .gallery-placeholder {
            width: 100%;
            background: #E8E2D9;
        }
    </style>
</head>
<body class="page-body">

    <nav class="nav" aria-label="Site navigation">
        <div class="nav__inner">
            <a href="index.html" class="nav__brand">The Café</a>
            <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav__links" id="nav-links" role="list">
                <li><a href="about.html">About</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="btn btn-primary">Book a Catering</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="section" aria-labelledby="gallery-heading">
            <div class="container">
                <h1 id="gallery-heading">Gallery</h1>
                <p style="margin-top: 0.75rem;">A look at our events, spreads, and everything in between.</p>

                <!-- TODO: replace placeholder divs with real <img> tags once client provides photos -->
                <!-- All images should use loading="lazy" -->
                <div class="gallery-grid" role="list">

                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 4/3;"></div>
                    </div>
                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 3/4;"></div>
                    </div>
                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 1/1;"></div>
                    </div>
                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 4/3;"></div>
                    </div>
                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 3/2;"></div>
                    </div>
                    <div class="gallery-grid__item" role="listitem">
                        <div class="gallery-placeholder" style="aspect-ratio: 2/3;"></div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer class="footer" aria-label="Site footer">
        <div class="footer__inner">
            <p class="footer__brand">The Café</p>
            <ul class="footer__links" role="list">
                <li><a href="about.html">About</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <p class="footer__copy">&copy; <span class="footer-year"></span> The Café. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
