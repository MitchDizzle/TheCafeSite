<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FB Post Square — 1080×1080</title>
<link rel="stylesheet" href="social.css">

<!-- ══════════════ EDIT ONLY THIS BLOCK ══════════════ -->
<script>
const CONFIG = {
    eyebrow:    "Leavenworth, Kansas",
    headline:   "Now Serving Lunch",
    subline:    "Fresh from our kitchen, Monday through Friday",
    cta:        "Call to Order · (913) 547-9994",
    photo:      "",     // e.g. "../site/assets/gallery/plate.jpg" — empty = placeholder gradient
    showGuides: false   // true while designing; MUST be false before export
};
</script>
<!-- ═══════════════════════════════════════════════════ -->

<style>
    .canvas { width: 1080px; height: 1080px; }
    /* Square fallback / IG-ready — no crop margins to worry about,
       just the 80px inner padding rule. */
    .content { padding: 80px; gap: 26px; }
    .wordmark { font-size: 64px; color: var(--cream); }
    .eyebrow { font-size: 26px; color: var(--cream); opacity: 0.8; margin-top: 10px; }
    .headline { font-size: 104px; color: var(--cream); text-shadow: 0 3px 32px rgba(0,0,0,0.45); max-width: 900px; }
    .subline { font-size: 36px; color: var(--cream); opacity: 0.9; max-width: 760px; }
    .filigree { color: var(--cream); margin: 6px 0; }
    .cta { font-size: 30px; padding: 24px 54px; margin-top: 22px; }
    .guide-safe { left: 80px; right: 80px; top: 80px; bottom: 80px; }
</style>
</head>
<body>

<div class="canvas">
    <div class="photo-layer"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="wordmark">The Café</div>
        <div class="filigree"><span class="gem"></span></div>
        <div class="eyebrow" id="eyebrow"></div>
        <div class="headline" id="headline"></div>
        <div class="subline" id="subline"></div>
        <div class="cta" id="cta"></div>
    </div>

    <div class="guide guide-safe" title="80px padding safe zone"></div>
</div>

<script>
    document.getElementById('eyebrow').textContent  = CONFIG.eyebrow;
    document.getElementById('headline').textContent = CONFIG.headline;
    document.getElementById('subline').textContent  = CONFIG.subline;
    document.getElementById('cta').textContent      = CONFIG.cta;
    if (CONFIG.photo) document.querySelector('.photo-layer').style.setProperty('--photo', 'url("' + CONFIG.photo + '")');
    if (CONFIG.showGuides) document.body.classList.add('show-guides');
</script>
</body>
</html>
