<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Post — 1200×627</title>
<link rel="stylesheet" href="social.css">

<!-- ══════════════ EDIT ONLY THIS BLOCK ══════════════ -->
<script>
const CONFIG = {
    eyebrow:    "Leavenworth, Kansas",
    headline:   "Let Us Cater Your Next Meeting",
    subline:    "Bundles that feed 6 to 60 — delivered",
    cta:        "Call to Plan It · (913) 547-9994",
    photo:      "",     // e.g. "../site/assets/gallery/spread.jpg" — empty = placeholder gradient
    showGuides: false   // true while designing; MUST be false before export
};
</script>
<!-- ═══════════════════════════════════════════════════ -->

<style>
    /* LinkedIn's native landscape feed ratio (1.91:1). Landscape = less
       vertical room: tighter gaps, wide headline. 60px padding safe zone. */
    .canvas { width: 1200px; height: 627px; }
    .content { padding: 60px; gap: 16px; }
    .wordmark { font-size: 46px; color: var(--cream); }
    .eyebrow { font-size: 20px; color: var(--cream); opacity: 0.8; margin-top: 4px; }
    .headline { font-size: 72px; color: var(--cream); text-shadow: 0 3px 28px rgba(0,0,0,0.45); max-width: 1000px; }
    .subline { font-size: 28px; color: var(--cream); opacity: 0.9; max-width: 860px; }
    .filigree { color: var(--cream); margin: 2px 0; }
    .cta { font-size: 24px; padding: 18px 44px; margin-top: 12px; }
    .guide-safe { left: 60px; right: 60px; top: 60px; bottom: 60px; }
</style>
</head>
<body>

<div class="canvas">
    <div class="photo-layer"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="wordmark">The Café</div>
        <div class="filigree"><span class="gem"></span></div>
        <div class="eyebrow" id="eyebrow"></div>
        <div class="headline" id="headline"></div>
        <div class="subline" id="subline"></div>
        <div class="cta" id="cta"></div>
    </div>

    <div class="guide guide-safe" title="60px padding safe zone"></div>
</div>

<script>
    document.getElementById('eyebrow').textContent  = CONFIG.eyebrow;
    document.getElementById('headline').textContent = CONFIG.headline;
    document.getElementById('subline').textContent  = CONFIG.subline;
    document.getElementById('cta').textContent      = CONFIG.cta;
    if (CONFIG.photo) document.querySelector('.photo-layer').style.setProperty('--photo', 'url("' + CONFIG.photo + '")');
    if (CONFIG.showGuides) document.body.classList.add('show-guides');
</script>
</body>
</html>
