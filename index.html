    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


        html, body { height: 100%; overflow: hidden; }

        /* Slideshow */
        .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        .slideshow { position: absolute; inset: 0; }

        .slide {
            position: absolute; inset: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        /* Placeholder gradients — replace with real photos */
        .slide-placeholder { width: 100%; height: 100%; }
        .slide-1 .slide-placeholder { background: linear-gradient(135deg, #8B4513 0%, #A0522D 40%, #CD853F 100%); }
        .slide-2 .slide-placeholder { background: linear-gradient(135deg, #6B2020 0%, #B22222 50%, #8B3A3A 100%); }
        .slide-3 .slide-placeholder { background: linear-gradient(135deg, #4A3728 0%, #6B4C3B 50%, #8B6355 100%); }
        .slide-4 .slide-placeholder { background: linear-gradient(135deg, #3D2B1F 0%, #5C3D2E 40%, #8B5E45 100%); }

        /* Overlay */
        .overlay { position: absolute; inset: 0; background: var(--overlay); z-index: 1; }

        /* Hero content */
        .hero-content {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 1.5rem; gap: 0.75rem;
        }

        .hero-eyebrow {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.7rem, 2vw, 0.95rem);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.75;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 700;
            line-height: 1;
            color: var(--cream);
            text-shadow: 0 2px 28px rgba(0, 0, 0, 0.45);
            letter-spacing: 0.02em;
        }

        .hero-subspace {
            display: flex; gap: 0.5rem;
            padding: 0.5rem 1rem 0.5rem;
            flex-wrap: wrap; justify-content: center;
            background-color: rgba(0, 0, 0, 0.45);
            border-radius: 10px;
        }

        .hero-subtitle {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: var(--cream);
            opacity: 0.85;
            max-width: 40ch;
            line-height: 1.65;
            margin-top: 0.25rem;
        }
        
        .filigree-subspace {
            display: block; 
            flex-direction: column;
        }

        .hero-subtitle a {
            color: var(--text-link);
        }


        /* Buttons */
        .hero-actions {
            display: flex; gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap; justify-content: center;
        }

        .btn {
            font-family: 'Lato', sans-serif;
            font-weight: 400;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.9rem 2.4rem;
            border-radius: 2px;
            border: 2px solid transparent;
            display: inline-block; cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:focus-visible { outline: 3px solid var(--cream); outline-offset: 3px; }

        .btn-primary {
            background: var(--firebrick);
            color: var(--cream);
            border-color: var(--firebrick);
        }
        .btn-primary:hover { background: var(--firebrick-dark); border-color: var(--firebrick-dark); }

        .btn-ghost {
            background: transparent;
            color: var(--cream);
            border-color: var(--cream);
        }
        .btn-ghost:hover { background: var(--cream); color: var(--text-dark); }

        /* Slide dots */
        .dots {
            position: absolute; bottom: 1.75rem; left: 50%;
            transform: translateX(-50%); z-index: 2;
            display: flex; gap: 0.55rem;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(250, 247, 242, 0.35);
            border: none; cursor: pointer; padding: 0;
            transition: background 0.3s, transform 0.2s;
        }
        .dot.active { background: var(--cream); transform: scale(1.3); }
        .dot:focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .slide { transition: opacity 0.01ms; }
            .btn, .dot { transition: none; }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .hero-actions { flex-direction: column; width: 100%; max-width: 280px; }
            .btn { text-align: center; width: 100%; }
        }

        /* Fixed size: SVG with only a viewBox stretches to fill its
           container, so cap it to divider proportions */
        .filigree-divider {
            width: min(340px, 70vw);
            height: auto;
            flex-shrink: 0;
        }

        /* Under-construction notice */
        .construction-banner {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            background: var(--firebrick);
            color: var(--cream);
            text-align: center;
            font-family: 'Lato', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            padding: 0.55rem 1.5rem;
        }

        .filigree-divider .line {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            stroke-linecap: round;
            animation: 5s ease-out forwards draw;
        }
        .filigree-divider .diamond-outer {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            stroke-linejoin: round;
            stroke-linecap: round;
            animation: 2s ease-out forwards 0.1s drawhalf;
        }
        .filigree-divider .diamond-inner {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            stroke-linejoin: round;
            stroke-linecap: round;
            animation: 1.6s ease-out forwards 0.1s drawhalf;
        }
        .line:nth-child(2) { animation-delay: 1.5s; }
        .line:nth-child(4) { animation-delay: 1.5s; }
        .line:nth-child(5) { animation-delay: 0.5s; }
        .line:nth-child(6) { animation-delay: 0.5s; }
        .line:nth-child(7) { animation-delay: 1s; }
        .line:nth-child(8) { animation-delay: 1s; }
        @keyframes draw {
            to {
               stroke-dashoffset: 0;
            }
        }
        @keyframes drawhalf {
            to {
               stroke-dashoffset: 0.49;
            }
        }
    </style>
</head>
<body>

<div class="construction-banner" role="note">

<main class="hero" role="main">

<script>
(function () {
    const slides  = document.querySelectorAll('.slide');
    const dots    = document.querySelectorAll('.dot');
    let current   = 0;
    let timer;

    function loadSlide(slide) {
        const src = slide.dataset.src;
        if (!src) return;
        const placeholder = slide.querySelector('.slide-placeholder');
        const img = new Image();
        img.alt = '';
        img.src = src;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onload = () => { if (placeholder) placeholder.replaceWith(img); };
        delete slide.dataset.src;
    }

    function goTo(index) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        dots[current].setAttribute('aria-selected', 'false');

        current = index;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
        dots[current].setAttribute('aria-selected', 'true');

        // Pre-load the next slide so it's ready
        const next = slides[(current + 1) % slides.length];
        if (next.dataset.src) loadSlide(next);
    }

    function advance() { goTo((current + 1) % slides.length); }

    function startTimer() { timer = setInterval(advance, 8000); }
    function resetTimer()  { clearInterval(timer); startTimer(); }

    dots.forEach(dot => {
        dot.addEventListener('click', () => {
            goTo(parseInt(dot.dataset.index, 10));
            resetTimer();
        });
    });

    // Pre-load slide 2 immediately so it's ready when the timer first fires
    loadSlide(slides[1]);

    // Pause autoplay when tab is not visible
    document.addEventListener('visibilitychange', () => {
        document.hidden ? clearInterval(timer) : startTimer();
    });

    startTimer();
}());
</script>
